name: Deploy wiki to GitHub Pages

# Triggered every time the daily wiki_build job pushes new content to main,
# and on demand from the Actions UI. Builds the markdown vault into a static
# Quartz site and publishes it to the GitHub Pages environment.
#
# This workflow file lives in the wiki repo's .github/ directory. The Spark
# job that syncs the vault preserves .github/ across syncs (see
# _PRESERVED_AT_ROOT in daily_databricks_feed.wiki.git_sync, v0.4.10+).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy. Skipped runs are queued, not cancelled,
# so multiple back-to-back content pushes still produce one final deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout wiki content
        uses: actions/checkout@v4

      - name: Clone Quartz v4
        run: |
          git clone --depth 1 https://github.com/jackyzha0/quartz.git /tmp/quartz
          rm -rf /tmp/quartz/content
          mkdir -p /tmp/quartz/content

      - name: Stage wiki content into Quartz
        run: |
          # `*` skips dotfiles, so .git and .github are naturally excluded.
          # cp -r preserves directory structure so [[episodes/2026-05-02]]
          # links resolve correctly under content/.
          cp -r * /tmp/quartz/content/

      - name: Apply Quartz config override
        run: |
          # If .github/quartz/quartz.config.ts exists, it replaces the upstream
          # default. This is where pageTitle, ignorePatterns (e.g. people/**),
          # theme colors, and analytics get customized — see the file for
          # details. baseUrl is always overwritten by the next step regardless.
          if [ -f .github/quartz/quartz.config.ts ]; then
            cp .github/quartz/quartz.config.ts /tmp/quartz/quartz.config.ts
            echo "Applied custom quartz.config.ts"
          fi
          if [ -f .github/quartz/quartz.layout.ts ]; then
            cp .github/quartz/quartz.layout.ts /tmp/quartz/quartz.layout.ts
            echo "Applied custom quartz.layout.ts"
          fi

      - name: Configure Quartz baseUrl for project pages
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="${{ github.event.repository.name }}"
          # Quartz wants baseUrl WITHOUT scheme. Project pages live at
          # https://<owner>.github.io/<repo>/.
          sed -i "s|baseUrl: \".*\"|baseUrl: \"${OWNER}.github.io/${REPO}\"|" /tmp/quartz/quartz.config.ts

      - name: Inject disclaimer banner into all pages
        run: |
          # If .github/quartz/disclaimer.md exists, prepend its content to
          # every markdown file in the staged content (after the frontmatter
          # block). This is the per-page "auto-generated, may be inaccurate"
          # banner from the security review. Edit disclaimer.md to change the
          # text — no workflow change required.
          if [ -f .github/quartz/disclaimer.md ]; then
            python3 - <<'PYEOF'
          from pathlib import Path
          disclaimer = Path('.github/quartz/disclaimer.md').read_text()
          content_root = Path('/tmp/quartz/content')
          count = 0
          for md in content_root.rglob('*.md'):
              text = md.read_text()
              # Skip if the disclaimer was already injected (idempotent re-runs).
              if 'About this auto-generated wiki' in text:
                  continue
              if text.startswith('---'):
                  # Find the close of the YAML frontmatter and insert after it.
                  end = text.find('\n---\n', 3)
                  if end != -1:
                      new = text[: end + 5] + '\n' + disclaimer + text[end + 5 :]
                  else:
                      new = disclaimer + text
              else:
                  new = disclaimer + text
              md.write_text(new)
              count += 1
          print(f'Disclaimer injected into {count} pages')
          PYEOF
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        working-directory: /tmp/quartz
        run: npm ci

      - name: Build site
        working-directory: /tmp/quartz
        run: npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
